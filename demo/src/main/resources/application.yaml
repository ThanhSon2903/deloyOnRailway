server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url:  ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  mqtt:
    broker: ${MQTT_BROKER}
    client-id: spring-posture-server

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true